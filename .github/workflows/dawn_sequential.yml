name: Dawn Sequential Scraper

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      start_id:
        description: 'Override start ID (leave blank to use checkpoint)'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5 hours max — sequential runs are long

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Debug secrets
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "URL length: ${#SUPABASE_URL}"
          echo "KEY length: ${#SUPABASE_SERVICE_KEY}"
          echo "URL prefix: ${SUPABASE_URL:0:15}"
          echo "KEY prefix: ${SUPABASE_SERVICE_KEY:0:10}"

      - name: Run sequential scraper
        working-directory: scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OVERRIDE_START_ID:    ${{ inputs.start_id }}
        run: python -m dawn.sequential

      - name: Write run summary
        if: always()
        run: |
          echo "## Sequential scrape summary" >> $GITHUB_STEP_SUMMARY
          echo "Completed at $(date -u)" >> $GITHUB_STEP_SUMMARY
