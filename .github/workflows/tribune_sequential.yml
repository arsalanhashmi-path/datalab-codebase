name: Tribune Sequential Scraper

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      start_id:
        description: 'Override start ID (leave blank to use checkpoint)'
        required: false
        type: string
      max_id:
        description: 'Override max ID (leave blank to fetch from tribune.com.pk homepage)'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5 hours max

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run sequential scraper
        working-directory: scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OVERRIDE_START_ID:    ${{ inputs.start_id }}
          OVERRIDE_MAX_ID:      ${{ inputs.max_id }}
        run: python -m tribune.sequential

      - name: Write run summary
        if: always()
        run: |
          echo "## Tribune sequential scrape summary" >> $GITHUB_STEP_SUMMARY
          echo "Completed at $(date -u)" >> $GITHUB_STEP_SUMMARY
